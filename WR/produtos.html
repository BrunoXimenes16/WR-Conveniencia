<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Produtos</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: linear-gradient(135deg, #1a1a1a, #FFC107);
    padding: 20px;
}

h2 {
    text-align: center;
    color: white;
    margin-bottom: 20px;
}

.topo {
    text-align: right;
    margin-bottom: 10px;
}

.topo a {
    background: white;
    padding: 10px 15px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
}

/* GRID */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

/* CARD */
.produto {
    background: white;
    width: 220px;
    margin: 10px;
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.produto:hover {
    transform: scale(1.05);
}

/* IMAGEM */
.produto img {
    width: 100%;
    height: 140px;
    object-fit: cover;
    border-radius: 8px;
}

/* TEXTO */
.produto h3 {
    margin: 10px 0;
}

/* PREÇO */
.preco {
    font-size: 18px;
    font-weight: bold;
    color: #FF8F00;
}

/* BOTÃO */
button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    background: linear-gradient(45deg, #FFC107, #FF8F00);
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    opacity: 0.9;
}
</style>

</head>
<body>

<div class="topo">
    <a href="carrinho.html">🛒 Ver Carrinho</a>
</div>

<h2>Catálogo de Produtos</h2>

<div class="container">

    <div class="produto">
        <img src="img/pack-eisenbahn.jpg">
        <h3>Pack cerveja Eisenbahn 355ml 6 un.</h3>
        <p class="preco">R$ 50,00</p>
        <button onclick="addCarrinho('Pack cerveja Eisenbahn 355ml 6 un.', 50)">Adicionar ao carrinho</button>
    </div>

    <div class="produto">
        <img src="img/heineken-latao.jpg">
        <h3>Caixa cerveja Heineken 350ml 12 un.</h3>
        <p class="preco">R$ 65,00</p>
        <button onclick="addCarrinho('Caixa cerveja Heineken 350ml 12 un.', 65)">Adicionar ao carrinho</button>
    </div>

    <div class="produto">
        <img src="img/coca-zero.jpg">
        <h3>Refrigerante Coca-Cola sem açúcar garrafa 2L</h3>
        <p class="preco">R$ 11,00</p>
        <button onclick="addCarrinho('Refrigerante Coca-Cola 2L', 11)">Adicionar ao carrinho</button>
    </div>

    <div class="produto">
        <img src="img/campari.jpg">
        <h3>Aperitivo Bitter Campari garrafa 900ml</h3>
        <p class="preco">R$ 90,00</p>
        <button onclick="addCarrinho('Campari 900ml', 90)">Adicionar ao carrinho</button>
    </div>

    <div class="produto">
        <img src="img/amstel.jpg">
        <h3>Caixa cerveja Amstel 269ml 12 un.</h3>
        <p class="preco">R$ 40,00</p>
        <button onclick="addCarrinho('Amstel 12un', 40)">Adicionar ao carrinho</button>
    </div>

</div>

<script>
function addCarrinho(nome, preco) {
    let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

    preco = Number(preco);

    let itemExistente = carrinho.find(p => p.nome === nome);

    if (itemExistente) {
        itemExistente.qtd = Number(itemExistente.qtd) + 1;
    } else {
        carrinho.push({
            nome: nome,
            preco: preco,
            qtd: 1
        });
    }

    localStorage.setItem("carrinho", JSON.stringify(carrinho));

    alert("Produto adicionado ao carrinho!");
}
</script>

</body>
</html>
