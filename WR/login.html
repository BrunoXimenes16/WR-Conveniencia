<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #1a1a1a, #FFC107); 
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* TOPO COM LOGO */
.header {
    position: absolute;
    top: 20px;
}

.header img {
    width: 120px;
}

/* CAIXA DE LOGIN */
.container {
    background: rgba(255, 255, 255, 0.97);
    padding: 30px;
    width: 320px;
    border-radius: 15px;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.4);
    text-align: center;
}

h2 {
    margin-bottom: 20px;
    color: #333;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 8px;
}

input:focus {
    border-color: #FFC107;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: linear-gradient(45deg, #FFC107, #FF8F00);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    transform: scale(1.03);
}

a {
    display: block;
    margin-top: 15px;
    text-decoration: none;
    color: #FFC107;
}
</style>

</head>
<body>

<div class="header">
    <img src="logo-wr.png" alt="Logo">
</div>

<div class="container">
    <h2>Login</h2>
    <input type="email" placeholder="E-mail">
    <input type="password" placeholder="Senha">
    <button>Entrar</button>
    <a href="cadastro.html">Criar conta</a>
</div>

</body>
</html>
