<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pedido Confirmado</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #1a1a1a, #FFC107);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CAIXA */
.container {
    background: white;
    width: 350px;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    text-align: center;
}

h2 {
    color: green;
    margin-bottom: 10px;
}

/* STATUS */
.status {
    margin: 20px 0;
    text-align: left;
}

.status div {
    margin: 10px 0;
    padding: 8px;
    border-radius: 6px;
    background: #eee;
}

/* ATIVO */
.ativo {
    background: #FFC107;
    font-weight: bold;
}

/* FINAL */
.finalizado {
    background: #4CAF50;
    color: white;
}

/* BOTÃO */
button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: linear-gradient(45deg, #FFC107, #FF8F00);
    border: none;
    color: white;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

/* 🔔 TOAST */
.toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #333;
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    opacity: 0;
    transform: translateY(20px);
    transition: 0.3s;
}

.toast.show {
    opacity: 1;
    transform: translateY(0);
}
</style>

</head>
<body>

<div class="container">
    <h2>✅ Pedido Confirmado!</h2>
    <p>Seu pedido está sendo processado.</p>

    <div class="status">
        <div id="s1">📦 Pedido em preparo</div>
        <div id="s2">🚚 Saiu para entrega</div>
        <div id="s3">🏁 Entregue</div>
    </div>

    <p><strong>Tempo estimado:</strong> 30 - 50 minutos</p>

    <button onclick="window.location.href='produtos.html'">
        Voltar para loja
    </button>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script>
let etapa = 0;

function mostrarToast(texto) {
    let toast = document.getElementById("toast");
    toast.innerText = texto;
    toast.classList.add("show");

    setTimeout(() => {
        toast.classList.remove("show");
    }, 2000);
}

function atualizarStatus() {
    // reset visual
    document.getElementById("s1").className = "";
    document.getElementById("s2").className = "";
    document.getElementById("s3").className = "";

    if (etapa === 0) {
        document.getElementById("s1").classList.add("ativo");
        mostrarToast("📦 Pedido em preparo");
    }

    if (etapa === 1) {
        document.getElementById("s1").classList.add("finalizado");
        document.getElementById("s2").classList.add("ativo");
        mostrarToast("🚚 Saiu para entrega");
    }

    if (etapa === 2) {
        document.getElementById("s1").classList.add("finalizado");
        document.getElementById("s2").classList.add("finalizado");
        document.getElementById("s3").classList.add("finalizado");
        mostrarToast("🏁 Pedido entregue!");
    }

    etapa = (etapa + 1) % 3; // LOOP INFINITO
}

// inicia
atualizarStatus();

// animação contínua (a cada 4 segundos)
setInterval(atualizarStatus, 4000);
</script>

</body>
</html>
